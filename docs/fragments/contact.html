<section class="container my-5">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <h2 class="display-5 fw-bold text-primary text-center">تماس با ما</h2>
            <form id="contactForm">
                <div class="mb-3">
                    <label class="form-label">نام و نام خانوادگی</label>
                    <input type="text" class="form-control" placeholder="نام خود را وارد کنید" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">ایمیل</label>
                    <input type="email" class="form-control" placeholder="ایمیل خود را وارد کنید" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">پیام</label>
                    <textarea class="form-control" rows="4" placeholder="پیام خود را بنویسید..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">ارسال پیام</button>
            </form>
        </div>
    </div>
</section>
