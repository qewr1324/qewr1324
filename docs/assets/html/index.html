    <meta charset="UTF-8">

    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e0e0e0;
            --accent: #0f3460;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Courier New', monospace;
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 2rem;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .skill-card {
            background: var(--card-bg);
            border: 2px solid #2a2a4a;
            border-radius: 12px;
            padding: 1.5rem;
            cursor: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .skill-card:hover {
            border-color: #4a9eff;
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(74, 158, 255, 0.2);
        }

        .skill-card .icon-wrap {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .skill-card .cursor-icon {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
            transition: transform 0.3s ease;
        }

        .skill-card:hover .cursor-icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 16px rgba(100, 200, 255, 0.6));
        }

        .skill-card h3 {
            font-size: 1.2rem;
            color: #fff;
            margin: 0;
        }

        .skill-card .percent-bar {
            height: 6px;
            background: #2a2a4a;
            border-radius: 3px;
            margin: 0.8rem 0;
            overflow: hidden;
        }

        .skill-card .percent-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        .skill-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .skill-card .tag {
            background: #2a2a4a;
            color: #aaa;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            border: 1px solid #3a3a5a;
        }

        /* Custom Cursor Overlay */
        .custom-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 48px;
            height: 48px;
            transform: translate(-10px, -10px);
            opacity: 0;
            transition: opacity 0.15s ease;
            filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.5));
        }

        .custom-cursor.active {
            opacity: 1;
        }

        .custom-cursor.hovering {
            transform: translate(-10px, -10px) scale(1.3);
            filter: drop-shadow(0 0 12px rgba(255, 200, 50, 0.8));
        }

        /* Percent colors per skill */
        .percent-java {
            background: linear-gradient(90deg, #f89820, #e76f00);
        }

        .percent-spring {
            background: linear-gradient(90deg, #6db33f, #5a9e2f);
        }

        .percent-servlet {
            background: linear-gradient(90deg, #007396, #005a75);
        }

        .percent-springcore {
            background: linear-gradient(90deg, #5fbcd3, #3a9ab8);

        // Build skill cards
        const grid = document.getElementById('skillsGrid');
        const cursorEl = document.getElementById('customCursor');

        skillsData.skills.forEach(skill => {
            const iconKey = skill.icon;
            const percentClass = `percent-${iconKey}`;

            const card = document.createElement('div');
            card.className = 'skill-card';
            card.dataset.cursor = iconKey;
            card.innerHTML = `
                <div class="icon-wrap">
                    <div class="cursor-icon">
                        ${cursorSVGs[iconKey]?.pointer || cursorSVGs['bash'].pointer}
                    </div>
                    <div>
                        <h3>${skill.name}</h3>
                        <small style="color:#aaa; font-size:0.7rem;">${skill.percent}%</small>
                    </div>
                </div>
                <div class="percent-bar">
                    <div class="percent-fill ${percentClass}" style="width:${skill.percent}%"></div>
                </div>
                <div class="tags">
                    ${skill.titles.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
            `;

            // Mouse events for custom cursor
            card.addEventListener('mouseenter', (e) => {
                const key = card.dataset.cursor;
                cursorEl.innerHTML = cursorSVGs[key]?.hover || cursorSVGs['bash'].hover;
                cursorEl.classList.add('active', 'hovering');
                document.body.style.cursor = 'none';
            });

            card.addEventListener('mouseleave', () => {
                cursorEl.classList.remove('active', 'hovering');
                document.body.style.cursor = 'default';
            });

            grid.appendChild(card);
        });

        // Track mouse for custom cursor
        document.addEventListener('mousemove', (e) => {
            cursorEl.style.left = e.clientX + 'px';
            cursorEl.style.top = e.clientY + 'px';
        });

        // Hide default cursor on cards
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('.skill-card')) {
                document.body.style.cursor = 'none';
            }
        });

        document.addEventListener('mouseout', (e) => {
            if (!e.target.closest('.skill-card')) {
                document.body.style.cursor = 'default';
                cursorEl.classList.remove('active', 'hovering');
            }
        });

        console.log('🎮 Pixel Cursors Ready! 18 unique skill cursors loaded.');
    </script>
</body>
