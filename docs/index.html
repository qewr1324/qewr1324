<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رزومه جونیور | مهارت‌ها با زیرمجموعه</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/brands.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/fontawesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="custom-cursor">

  <div class="resume-card">

    <div class="profile-section">
      <div class="avatar-box">
        <img
          src="https://ui-avatars.com/api/?name=Amir+Reza&size=120&background=0f172a&color=60a5fa&bold=true&font-size=0.5"
          alt="تصویر پروفایل">
      </div>
      <div class="intro-text">
        <h1>امیرحسین محمدی فرد</h1>
        <div class="badge-junior"><i class="fas fa-code" style="margin-left: 6px;"></i> توسعه‌دهنده جونیور</div>
        <p>
          <i class="fas fa-quote-right" style="color: #3b82f6; margin-left: 6px;"></i>
          علاقه‌مند به بک‌اند | همیشه در حال یادگیری
        </p>
      </div>
    </div>

    <div class="skills-wrapper">

      <div class="radial-circle-container">
        <div class="radial-circle">
          <svg viewBox="0 0 240 240">
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2563eb" />
                <stop offset="100%" stop-color="#7c3aed" />
              </linearGradient>
            </defs>
            <circle class="bg-circle" cx="120" cy="120" r="100" />
            <circle class="progress-circle" id="progressCircle" cx="120" cy="120" r="100" />
          </svg>
          <div class="center-percent">
            <span id="percentDisplay">۰٪</span>
          </div>
        </div>
      </div>

      <div class="skill-list" id="skillList">
        <!-- Loading... -->
        <div style="color: #94a3b8; padding: 1rem; grid-column: 1 / -1; text-align: center;">
          <i class="fas fa-spinner fa-spin"></i> در حال بارگذاری...
        </div>
      </div>
    </div>

    <div class="extra-section" id="projectList">
      <!-- Loading... -->
      <div style="color: #94a3b8; padding: 0.5rem; width: 100%; text-align: center;">
        <i class="fas fa-spinner fa-spin"></i> در حال بارگذاری...
      </div>
    </div>

    <div class="footer-note">
      <i class="fas fa-mouse-pointer" style="margin-left: 6px;"></i>
      هاور روی هر مهارت — دایره به‌روز می‌شود + نمایش زیرمجموعه‌ها
    </div>
  </div>

  <div class="skill-tooltip" id="skillTooltip">
    <div class="tooltip-title">
      <i class="fas fa-list-ul"></i>
      <span id="tooltipSkillName">مهارت</span>
    </div>
    <div class="tooltip-items" id="tooltipItems">
    </div>
  </div>

  <script src="./assets/js/script.js"></script>

</body>

</html>
